name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # CI never depends on a developer machine: everything below is either
  # a public dummy (validated shapes only - no suite in the gated lanes
  # talks to a real external service) or provided by GitHub.
  AUTH_HASH_SALT: ci-dummy-salt-not-a-secret-0123456789
  NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key

jobs:
  quality:
    name: Format / Lint / Types / Public-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check:public-env

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run test:unit

  visual:
    name: Visual regression (Design Quality Gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      # Baselines are committed and generated on this same Ubuntu image, so
      # font anti-aliasing matches. `--with-deps` installs the OS libraries.
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:visual
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  prisma:
    name: Schema / Migrations / Generated client
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: tirvea_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/tirvea_ci
      DIRECT_URL: postgresql://postgres:ci@localhost:5432/tirvea_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - name: Schema is valid + committed generated client has no drift
        run: npm run db:validate
      - name: Migrations replay cleanly onto an empty database
        run: npx prisma migrate deploy
      - name: Migration history reproduces the schema exactly
        # Prisma 7.8 flags: compare the migrated datasource (the ephemeral DB
        # just brought up by `migrate deploy` above) against the schema
        # datamodel. Empty diff (exit 0) proves migrations ≡ schema; a
        # non-empty diff (exit 2) fails the job.
        run: >
          npx prisma migrate diff
          --from-config-datasource
          --to-schema prisma/schema.prisma
          --exit-code

  integration:
    name: Integration tests (ephemeral Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: tirvea_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/tirvea_ci
      DIRECT_URL: postgresql://postgres:ci@localhost:5432/tirvea_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run test:integration
      # The 4 live-Supabase suites run only when real credentials are
      # configured as repo secrets; otherwise they are explicitly skipped
      # (they still run locally against .env as before).
      - name: Live-Supabase suites (secrets-gated)
        if: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY != '' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:integration:live

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run build

  audit:
    name: Dependency audit (fail on high+ in prod deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      # Policy: production dependencies must be free of HIGH and CRITICAL
      # advisories. Moderate findings are reported (visible in the log)
      # but do not block; dev-only deps do not gate delivery.
      - run: npm audit --omit=dev || true
      - run: npm audit --omit=dev --audit-level=high

  secrets:
    name: Secret scan (working tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks (pinned)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      # Filesystem scan of the checkout (deterministic; history is not
      # rescanned on every push). --redact keeps any finding out of logs.
      - run: gitleaks detect --no-git --redact --verbose

  # ---------------------------------------------------------------------
  # Gated production release (L7.3.7). The authoritative delivery path:
  # migrations ALWAYS run and verify against the production database BEFORE
  # the app build is activated, on the SAME commit, fail-closed. Inactive
  # until configured:
  #   1. Vercel env var CI_DEPLOYS_ONLY=1 (production) - flips
  #      vercel.json's ignoreCommand so git pushes stop auto-building.
  #   2. Repo secrets VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID and
  #      PROD_DATABASE_URL / PROD_DIRECT_URL (migration + runtime targets).
  #   3. (optional) PROD_SUPABASE_URL / PROD_SUPABASE_SERVICE_ROLE_KEY for
  #      the post-deploy email-OTP smoke e2e.
  # Until then this job is a no-op notice and Vercel auto-deploy behaves
  # exactly as before (behaviour preserved). See docs/RELEASE.md.
  # ---------------------------------------------------------------------
  deploy:
    name: Release to production (migration-gated)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, unit, visual, prisma, integration, build, audit, secrets]
    runs-on: ubuntu-latest
    # Serialize production releases: never let two runs apply migrations or
    # promote different commits concurrently. Queue (do NOT cancel) so an
    # in-flight migrate deploy is never interrupted mid-release.
    concurrency:
      group: production-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci

      - name: Activation gate (required secrets present?)
        id: gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROD_DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$PROD_DIRECT_URL" ]; then
            echo "::notice::CI-gated release inactive (VERCEL_TOKEN or PROD_DIRECT_URL unset); Vercel git auto-deploy remains the delivery path until activation. See docs/RELEASE.md."
            echo "active=false" >> "$GITHUB_OUTPUT"
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
          fi

      # STAGE 1-4: preflight -> migrate deploy -> schema verify. Fail-closed:
      # a non-zero here stops the release with NO new build activated.
      - name: Production DB release gate
        if: steps.gate.outputs.active == 'true'
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: npm run release:production

      # STAGE 5-6: build + promote the SAME commit, ONLY after the DB gate.
      - name: Build & deploy to Vercel Production (prebuilt)
        if: steps.gate.outputs.active == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel build --prod --token "$VERCEL_TOKEN"
          url=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "DEPLOY_URL=$url" >> "$GITHUB_ENV"
          echo "::notice::Deployed $url (commit ${GITHUB_SHA})"

      - name: Wait until deployment is Ready
        if: steps.gate.outputs.active == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel inspect "$DEPLOY_URL" --wait --token "$VERCEL_TOKEN"

      # STAGE 7: smoke the LIVE deployment; a failure fails the release.
      - name: Post-deploy smoke tests
        if: steps.gate.outputs.active == 'true'
        env:
          TARGET: https://tirvea.com
          EXPECTED_COMMIT: ${{ github.sha }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::PROD_SUPABASE_SERVICE_ROLE_KEY unset - smoke runs HTTP-surface checks only; email-OTP e2e skipped (not a full GO)."
            export SMOKE_SKIP_OTP=1
          fi
          npm run release:smoke
